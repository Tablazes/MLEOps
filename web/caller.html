<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f5f7" />
    <title>VitaCall, beller</title>
    <link rel="stylesheet" href="css/app.css" />
</head>
<body>
    <main class="caller" aria-live="polite">
        <!-- Kop: merk + status -->
        <div class="caller__top">
            <p class="caller__phase" id="phase">alarmcentrale</p>
            <h1 class="caller__status" id="status">VitaCall</h1>
            <p class="caller__sub" id="sub"></p>
            <p class="offline is-hidden" id="offline" role="status">
                <span class="offline__dot"></span>
                <span id="offlineText">geen verbinding</span>
            </p>
        </div>

        <!-- Live transcript (alleen tijdens actief gesprek) -->
        <section class="caller__transcript card is-hidden" id="transcriptCard" aria-label="Live transcript">
            <div class="card__head">
                <span class="card__title">Live transcript</span>
                <span class="pulse"><span class="pulse__dot"></span>live</span>
            </div>
            <ul class="transcript" id="transcript"></ul>
            <p class="transcript__text transcript__text--partial" id="partial"></p>
        </section>

        <!-- Grote belknop -->
        <div class="caller__dial">
            <button
                type="button"
                id="callBtn"
                class="caller__callbtn caller__callbtn--call"
                aria-label="Bel alarmcentrale"
            >
                <!-- icon wordt door caller.js gevuld -->
            </button>
            <span class="caller__callbtn-label" id="callLabel">Bel alarmcentrale</span>
        </div>
    </main>

    <script type="module" src="js/caller.js"></script>
</body>
</html>
