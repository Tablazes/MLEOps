services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./pipeline/sentiment_model.pkl:/app/pipeline/sentiment_model.pkl:ro
      - ./pipeline/vosk-model-small-nl:/app/pipeline/vosk-model-small-nl:ro
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - api
    restart: unless-stopped
