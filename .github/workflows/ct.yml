name: Continuous Training

on:
  schedule:
    - cron: "0 3 * * 0"  # elke zondag 03:00 UTC
  workflow_dispatch:      # handmatig triggeren via GitHub UI

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install scikit-learn==1.5.2 pandas==2.2.3 numpy==1.26.4 \
                      pyarrow==17.0.0 requests==2.32.3 nbconvert==7.16.6 \
                      jupyter==1.1.1 ipykernel==6.29.5
      - name: Voer notebook end-to-end uit (retrain)
        run: |
          jupyter nbconvert --to notebook --execute main.ipynb \
                  --output main_ct_run.ipynb \
                  --ExecutePreprocessor.timeout=1800
      - name: Upload nieuwe modellen als artifact
        uses: actions/upload-artifact@v4
        with:
          name: vitacall-models-${{ github.run_number }}
          path: |
            models/sentiment_heavy.pkl
            models/sentiment_lite.pkl
            electron/src/sentiment_lite.json
          retention-days: 30
      - name: Upload uitgevoerd notebook
        uses: actions/upload-artifact@v4
        with:
          name: vitacall-notebook-${{ github.run_number }}
          path: main_ct_run.ipynb
          retention-days: 30
