name: CT — VitaCall Continuous Training

on:
  schedule:
    - cron: "0 2 1 * *"   # maandelijks, eerste dag om 02:00 UTC
  workflow_dispatch:
    inputs:
      reason:
        description: "Reden voor hertraining"
        required: true

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -e .
      - name: Drift check
        run: python -c "
from pipeline.monitoring import DriftMonitor
import pandas as pd, numpy as np
df = pd.read_parquet('data/silver/imdb/imdb.parquet')
train = df[df['split']=='train']
test  = df[df['split']=='test']
monitor = DriftMonitor(reference_data=train)
result = monitor.check_text_drift(train['text_clean'].tolist(), test['text_clean'].tolist())
print(result)
if result['token_length_psi'] > 0.2:
    raise SystemExit('Drift gedetecteerd — hertraining vereist')
"
      - name: Retrain model
        run: python pipeline/train.py --data data/silver/imdb --out pipeline/sentiment_model.pkl
